name: Deploy Project A

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    # ⭐️ 핵심: 우리가 세팅한 라벨(project-a, dev)을 정확히 호출합니다!
    runs-on: [self-hosted, project-a, dev]

    steps:
    - uses: actions/checkout@v4

    # (필요시 .NET 빌드/테스트 스텝 등 추가)

    - name: Run Deploy Script
      env:
        # GitHub Secrets에서 가져온 DB 정보를 환경변수로 넘겨줍니다.
        DB_URL: ${{ secrets.DB_URL }}
      run: |
        chmod +x ./deploy.sh
        ./deploy.sh